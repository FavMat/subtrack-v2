<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SubTrack</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080A0E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }

      // ── iOS PWA white-screen fix after file picker ──
      // When a PWA is in standalone mode, opening the native file picker
      // puts the WKWebView to sleep. On resume, the GPU compositing layer
      // is lost, causing a permanent white screen. This forces a repaint.
      (function() {
        function forceRepaint() {
          var root = document.getElementById('root');
          if (!root) return;
          root.style.opacity = '0.999';
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              root.style.opacity = '';
            });
          });
        }

        // Fires when returning from any external context (file picker, share sheet, etc.)
        window.addEventListener('pageshow', function(e) {
          forceRepaint();
          // If page was restored from bfcache, full reload is needed
          if (e.persisted) {
            window.location.reload();
          }
        });

        document.addEventListener('visibilitychange', function() {
          if (!document.hidden) {
            forceRepaint();
          }
        });

        window.addEventListener('focus', forceRepaint);
      })();
    </script>
  </body>
</html>

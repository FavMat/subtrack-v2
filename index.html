<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SubTrack</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080A0E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }

      // ── Global error catcher (shows on screen for mobile debugging) ──
      (function() {
        function showDebugOverlay(msg) {
          // Only show if no React content is visible (helps diagnose white screens)
          var overlay = document.getElementById('debug-overlay');
          if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'debug-overlay';
            overlay.style.cssText = [
              'position:fixed', 'bottom:0', 'left:0', 'right:0',
              'background:rgba(220,0,0,0.92)', 'color:#fff',
              'font-size:12px', 'font-family:monospace',
              'padding:12px', 'z-index:99999',
              'max-height:50vh', 'overflow-y:auto',
              'white-space:pre-wrap', 'word-break:break-all'
            ].join(';');
            document.body.appendChild(overlay);
          }
          overlay.textContent += '\n[' + new Date().toISOString().slice(11,19) + '] ' + msg;
        }

        window.addEventListener('error', function(e) {
          showDebugOverlay('JS ERROR: ' + (e.message || e) + '\n  @ ' + e.filename + ':' + e.lineno);
        });

        window.addEventListener('unhandledrejection', function(e) {
          showDebugOverlay('UNHANDLED PROMISE: ' + (e.reason?.message || e.reason || e));
        });

        // NOTA: Rimossa the forceRepaint() trick (opacity: 0.999) perché 
        // causa il collasso "White Screen" delle WebViews iOS quando ci sono i backdrop-filter!
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) { window.location.reload(); }
        });
      })();
    </script>
  </body>
</html>
